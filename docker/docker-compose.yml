version: '3.9'
services:
  backend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../backend:/app
    command: sh -c "npm install && npm run start:dev"
    ports:
      - "3000:3000"

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../frontend:/app
    command: sh -c "npm install && npm run start -- --host 0.0.0.0 --port 4200"
    ports:
      - "4200:4200"
    depends_on:
      - backend
